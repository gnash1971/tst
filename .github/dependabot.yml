# Mises à jour automatiques des dépendances — option C du plan
# (cf. docs/plan-industrialisation.md).
#
# Périmètre volontairement limité à npm (Tailwind) et GitHub Actions.
# Les dépendances Python de production (jinja2, pydantic) sont mises à jour
# manuellement : l'écosystème « uv » de Dependabot ne régénère pas
# requirements.txt et entrerait en conflit avec la garde anti-dérive du lock
# exécutée en CI.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Tailwind v4 est une refonte majeure (configuration en CSS, nouveau
    # moteur) qui casserait le build actuel basé sur Tailwind 3. On reste
    # en 3.x (patchs et mineures acceptés) jusqu'à une migration volontaire.
    ignore:
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
