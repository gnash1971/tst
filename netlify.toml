# Déploiement Netlify — Lentilly Tennis de Table
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Installer d'abord les dépendances Python de build (jinja2, pydantic),
  # figées dans requirements.txt (export de uv.lock), puis lancer le build.
  command = "pip install -r requirements.txt && npm run build"
  publish = "dist"

[build.environment]
  PYTHON_VERSION = "3.12"

# Le dossier 'dist/' est généré dynamiquement lors du build.
# Seuls les fichiers requis pour l'exécution publique (index.html, css/, js/,
# fonts/, fic/, logo/, pub/) sont inclus dans 'dist/'. Cela protège totalement
# les scripts de build, fichiers de config, et sources partielles contre
# l'accès public et les téléchargements non autorisés.
